name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint → Tests → Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        # Le script package.json est `vitest run` → déjà en mode single-run.
        # Pas besoin de flag --watchAll (c'est un flag Jest, rejeté par vitest).
        # Les env Supabase placeholder sont requises parce que src/lib/supabase.js
        # instancie createClient() au top-level import, et supabase-js v2 throw
        # si l'URL est vide — même si aucun test ne fait de requête réseau.
        run: npm test
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key-for-ci-build

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key-for-ci-build
